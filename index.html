                    text: "Last term, my friend Leo and I decided that our school needed a voice. The school magazine was fine, but let's be honest, nobody really read it apart from the teachers. We wanted something modern, something students could listen to on the bus. So, we pitched the idea of a school podcast to our headteacher, Mrs. Higgins. To our surprise, she not only agreed but gave us a small budget to buy a decent microphone.\n\nThe first episode was a disaster. We hadn't prepared a script, assuming we could just improvise and be funny. We ended up talking over each other, and there were agonizingly long periods of silence. When we listened back to it, we cringed. We realised that sounding natural actually requires a lot of planning. For the second episode, we mapped out segments, wrote bullet points, and invited the captain of the debate team as a guest.\n\nThe improvement was immense. Our peers started tuning in, and suddenly, people were coming up to us in the corridors suggesting topics. We talked about exam stress, cafeteria food, and even interviewed the caretaker, who turned out to have the most fascinating stories about the school's history. Running the podcast has taught me more about communication and meeting deadlines than any classroom project ever did.",

                    text: "My family loves watching cooking shows on television, so for my dad's fiftieth birthday, my brother and I decided to prepare a massive surprise dinner. We spent days secretly looking up recipes and buying ingredients. Our plan was incredibly ambitious: a three-course meal featuring a complex French soup, a perfectly roasted chicken, and a delicate chocolate soufflé for dessert.\n\nOn the afternoon of the party, we sent our parents out for a long walk. As soon as they left, we rushed into the kitchen. Things went wrong almost immediately. My brother dropped the eggs for the soufflé, meaning we had to quickly switch to a simple sponge cake. Then, while trying to blend the hot soup, I didn't hold the lid down properly. A wave of scalding orange liquid exploded across the kitchen, covering the walls, the ceiling, and my favourite t-shirt. I just stood there in shock, staring at the mess.\n\nWe spent the next two hours desperately scrubbing the walls instead of cooking. By the time our parents unlocked the front door, the kitchen was clean, but we only had a slightly burnt chicken and a hastily made salad to serve. Instead of being angry, my dad burst into laughter. He ordered some pizzas, and we spent the evening eating out of cardboard boxes. It wasn't the gourmet experience we had planned, but my dad said it was the most memorable birthday dinner he'd ever had.",

                    text: "When I moved to a new high school, I was painfully shy. I hated speaking in front of people, and the thought of raising my hand in class made my heart race. So, when my English teacher suggested I join the debate team, I thought she was crazy. She argued that my written essays were incredibly persuasive and that I just needed a platform to vocalize my ideas. Reluctantly, I attended the first meeting, planning to just sit in the back and observe.\n\nThe debate club was chaotic but exciting. The students were passionately arguing about environmental policies, cutting each other off with counter-arguments. The team captain, a fierce girl named Maya, noticed me hiding in the corner. Instead of letting me watch, she handed me a card with a topic and told me I had five minutes to prepare a one-minute speech arguing in favour of school uniforms. I was terrified.\n\nWhen my turn came, my voice shook, and I looked mostly at my shoes. But as I read my points, I realized they were actually logical. To my surprise, Maya nodded approvingly when I finished. Over the next few months, the club became my safe space. We practiced structuring arguments and projecting our voices. By the end of the year, I was competing in regional tournaments. I still get nervous before a debate, but I've learned that fear doesn't have to stop you from speaking your mind.",

                    text: "My older cousin, Mark, is a mountain biking fanatic. He spends every weekend flying down treacherous, rocky trails. For months, he had been begging me to come along. I usually prefer quiet weekends reading or playing video games, but eventually, his persistent enthusiasm wore me down. I agreed to a 'beginner-friendly' ride in the nearby national park. Mark assured me it would be a gentle cycle through the forest.\n\nWithin ten minutes of arriving, I knew he had lied. The 'gentle' trail started with a steep, agonizing climb that left my lungs burning. Mark effortlessly pedalled ahead, occasionally shouting encouragement over his shoulder. When we finally reached the top, the view was spectacular, stretching out over miles of dense green trees. But my relief was short-lived. Mark grinned and pointed to a narrow, twisting path heading straight down the mountain. \"Now for the fun part,\" he said.\n\nThe descent was terrifying. The bike bounced violently over roots and loose rocks. I squeezed the brakes so hard my knuckles turned white, convinced I was going to crash into a tree at any moment. But halfway down, something shifted. I stopped fighting the bike and started to move with it, leaning into the corners and letting the suspension absorb the bumps. The sheer speed was exhilarating. By the time we reached the car park, I was covered in mud, exhausted, and sporting a scraped elbow. Mark looked at me apologetically, expecting me to shout at him. Instead, I asked him when we could go again.",

                    text: "For months, our school had been buzzing with excitement about the upcoming 'Battle of the Bands' competition. My band, 'The Lunar Eclipses', had been practicing every day after school in my garage. Our lead singer, Chloe, had a voice that could shatter glass, and I felt fairly confident about my drumming skills. The only weak link was our bass player, Sam, who had a habit of forgetting his parts under pressure.\n\nOn the night of the competition, the school hall was packed. The atmosphere was electric, but the backstage area felt like a pressure cooker of nerves. Two bands performed before us, and they were astonishingly good. One group even brought their own light show. Seeing them, Sam began to hyperventilate. He looked pale and kept muttering that he wanted to go home. I had to physically block the door and remind him of the hundreds of hours we had spent rehearsing.\n\nWhen our name was called, we stumbled onto the stage. The lights were blinding. Chloe nodded at me, and I clicked my drumsticks together to start our original song. Surprisingly, the moment the music kicked in, Sam’s muscle memory took over. He didn't miss a single note. We didn't win the grand prize—that went to the band with the lights—but the sheer exhilaration of performing flawlessly in front of our peers made us feel like rock stars.",

                    instructions: "For questions 1-6, choose the answer (A, B, C or D) which you think fits best according to the text.",
                    text: "When my school announced a mandatory community service program, most students rushed to sign up for outdoor activities like park clean-ups or sports coaching. I, however, opted for the local public library. My friends thought I was crazy, assuming I’d spend my weekends dusting ancient encyclopedias in silence. I chose it simply because I wanted a quiet environment where I could occasionally read.\n\nMy supervisor, Mrs. Gable, quickly shattered my expectations of a peaceful retreat. On my first day, she handed me a brightly coloured t-shirt and informed me I would be assisting with the 'Toddler Story and Craft Hour'. I am not naturally good with small children, so I felt a wave of anxiety. For the first few weeks, I was mostly on crowd-control duty, trying to stop toddlers from eating the glue or drawing on the walls.\n\nGradually, though, I started to enjoy the chaos. I learned how to use different voices for the characters in the stories, which the kids found hilarious. One little boy, who initially refused to participate in any crafts, proudly handed me a slightly lopsided paper crown he had made specifically for me. By the end of the term, I realized that the library wasn't just a place to store books; it was a vibrant community hub. I decided to continue volunteering there even after my mandatory hours were completed.",

                    id: 8,
                    title: "An unusual holiday in Iceland",
                    instructions: "For questions 1-6, choose the answer (A, B, C or D) which you think fits best according to the text.",
                    text: "Most of my classmates spent their summer holidays lounging on sunny beaches in Spain or Greece. My parents, however, are adventurous travelers. Last August, they booked a two-week trip to Iceland. I wasn't thrilled. Packing thermals and waterproof boots while my friends were buying sunglasses felt incredibly unfair. I imagined two weeks of freezing weather and looking at barren rocks.\n\nThe flight landed in Reykjavik under a grey, drizzly sky, confirming my worst fears. However, things changed drastically the next day when we joined a glacier hiking tour. Strapping metal spikes, called crampons, to my boots, we walked onto the massive ice cap. The ice wasn't just white; it glowed with vivid shades of blue. Our guide led us to a deep crevasse, and peering into the icy darkness was both terrifying and mesmerizing.\n\nThe highlight of the trip wasn't the ice, though, but the geothermal activity. One evening, we visited the Secret Lagoon. Bathing in naturally hot water while the cold air chilled my face was a bizarre but incredibly relaxing experience. We also saw geysers erupting violently from the ground, shooting boiling water high into the air. I returned home with hundreds of photos and a realization that dramatic, extreme landscapes could be just as beautiful, if not more so, than a tropical beach.",

                    text: "At just sixteen, Liam is already the CEO of a small software company. His journey began two years ago out of pure frustration. Like many teenagers, he struggled to balance his homework, sports practices, and social life. Existing calendar apps were either too complicated or lacked the specific features a high school student needs. So, armed with online tutorials and a lot of patience, he decided to build his own.\n\nHe spent his evenings writing code, often staying up late to fix frustrating bugs that caused the app to crash. His prototype, named 'StudySync', included a feature that automatically silenced social media notifications during scheduled study times. When he finally showed it to his friends, their reaction was overwhelming. They all wanted to download it. Recognizing the potential, Liam spent another three months refining the design and user interface before officially launching it on the app store.\n\nThe success was largely due to a viral video posted by a popular educational vlogger who praised StudySync’s simplicity. Within a week, the app had ten thousand downloads. Liam suddenly found himself dealing with user feedback, software updates, and even advertising offers. He admits that managing a business while studying for exams is incredibly stressful. However, he also notes that seeing thousands of students genuinely benefiting from something he created in his bedroom is the ultimate reward.",

                    text: "I’ve always been a city kid. My idea of surviving in the wild involved finding a café with free Wi-Fi. However, my older brother persuaded me to join him on a 'wilderness survival' weekend. He promised it would build character. When we arrived at the dense, muddy forest camp, our instructor immediately confiscated our phones, watches, and any snacks we had hidden. We were handed a knife, some rope, and a flint for starting fires.\n\nThe first task was building a shelter before nightfall. We quickly realized that finding dry branches and leaves in a damp forest is incredibly difficult. My brother and I argued constantly over the best way to construct the roof, and our final result was little more than a pile of sticks that leaked when it rained later that night. We woke up cold, stiff, and miserable.\n\nHowever, the second day brought a sense of accomplishment. We finally managed to start a fire using the flint, striking the metal until our hands blistered. Cooking a simple stew over a fire we had made ourselves made the food taste like a feast. We also learned how to navigate using the position of the sun and moss on trees. While I was thrilled to return to my warm bed and modern plumbing, the weekend taught me that humans are far more capable of adapting to harsh conditions than we give ourselves credit for.",

                    instructions: "You are going to read an article. Six sentences have been removed from the article. Choose from the sentences A-G the one which fits each gap (1-6). There is one extra sentence.",
                    text: "In the desert of southern Peru lie the Nazca Lines, one of the world's greatest archaeological mysteries. These massive geoglyphs depict various animals, plants, and geometric shapes. {0} Some of the straight lines stretch for miles across the arid landscape. The lines were created by removing the reddish-brown iron oxide-coated pebbles that cover the surface of the Nazca Desert. {1} Due to the dry, windless, and stable climate of the plateau, the lines have been naturally preserved for over 2,000 years.\n\nBut why were they made? {2} Early theories suggested they were an astronomical calendar. Others proposed they acted as pathways for ceremonial processions. More recent research indicates a strong connection to water. {3} In a region where rain is extremely rare, water was a precious commodity, and rituals to summon it would have been crucial for survival.\n\nThe sheer scale of the designs has led some to wonder how they were created without aerial views. {4} They used simple tools and surveying equipment, like wooden stakes and ropes, to scale up small models into enormous ground drawings. \n\nToday, the Nazca Lines face modern threats. {5} Despite efforts to protect them, ensuring the long-term survival of this ancient wonder remains a constant challenge.",

                    text: "Graffiti is often seen as a modern phenomenon, primarily associated with the hip-hop culture of New York in the 1970s. However, the urge to leave a mark on a wall is incredibly ancient. {0} In the ruins of Pompeii, archaeologists have found political slogans, insults, and even romantic declarations carved into the stone. \n\nThe modern graffiti movement, however, began with a simple act of tagging. Teenagers would write their nicknames on subway trains to gain recognition among their peers. {1} The authorities, naturally, viewed this as vandalism and spent millions trying to clean the trains.\n\nOver time, graffiti evolved from simple signatures to complex, colourful murals known as 'masterpieces'. {2} They had to work quickly under the cover of darkness to avoid being caught by the police. \n\nToday, the line between vandalism and art is heavily debated. {3} Cities now commission artists to paint large murals to brighten up neglected areas. Famous street artists like Banksy have even had their work sold for millions in art galleries. {4} Despite this acceptance, illegal tagging still continues, meaning the controversy surrounding graffiti is unlikely to end anytime soon. {5}",

                    instructions: "You are going to read an article in which teenagers talk about their dream jobs. For questions 1-10, choose from the teenagers (A-D). The teenagers may be chosen more than once.",
                    questions: [
                        "Which teenager wants a career that involves defending the truth?",
                        "Which teenager is motivated by a desire to invent sustainable solutions?",
                        "Which teenager acknowledges their chosen path requires many years of intense study?",
                        "Which teenager wants to expose corruption and unfairness?",
                        "Which teenager is fascinated by the design of structures?",
                        "Which teenager wants to help people recover from physical trauma?",
                        "Which teenager thrives under the pressure of tight deadlines?",
                        "Which teenager says strong communication skills are essential for their job?",
                        "Which teenager wants a career where they advocate for others in court?",
                        "Which teenager likes understanding how complex systems work together?"
                    ],
                    texts: [
                        { id: "A", name: "Leo - Medicine", content: "I want to be a physiotherapist. I love the idea of helping athletes or accident victims rebuild their physical strength and recover from severe injuries. I know it requires at least six years of extremely demanding university study and exams, but the reward of helping someone walk again is completely worth the academic struggle." },
                        { id: "B", name: "Zoe - Engineering", content: "I am constantly taking things apart to see how the mechanics work. My dream is to become a civil engineer. I am fascinated by how massive bridges and skyscrapers are designed to withstand incredible forces. I specifically want to focus on inventing new, eco-friendly building materials to make cities more sustainable for the future." },
                        { id: "C", name: "Sam - Journalism", content: "I want to be an investigative journalist. I believe a free press is crucial for society. My goal is to uncover stories about corruption or injustice that people try to hide. The media industry is fast-paced, but I actually perform best when I'm under the stress of a tight deadline. You also need to be an excellent, persuasive writer." },
                        { id: "D", name: "Mia - Law", content: "My ambition is to become a defense lawyer. I want to stand up in a courtroom and argue on behalf of people who can't defend themselves. I have a strong sense of justice and I believe everyone deserves a fair trial. The job demands perfect public speaking skills and the ability to think logically and quickly on your feet." }
                    ],
                    answers: [2, 1, 0, 2, 1, 0, 2, 3, 3, 1]
                },
                {
                    id: 9,
                    title: "Four teenagers talk about their pets",
                    instructions: "You are going to read an article in which teenagers talk about their animals. For questions 1-10, choose from the teenagers (A-D). The teenagers may be chosen more than once.",
                    questions: [
                        "Which teenager has an animal with a physical disability?",
                        "Which teenager's pet requires a highly specific temperature to survive?",
                        "Which teenager adopted their pet after it had a difficult past?",
                        "Which teenager's pet is surprisingly noisy?",
                        "Which teenager has a pet that is not affectionate?",
                        "Which teenager says their pet forces them to exercise?",
                        "Which teenager's pet requires them to use visual signals to communicate?",
                        "Which teenager's pet mimics human behavior?",
                        "Which teenager enjoys the unique diet their pet eats?",
                        "Which teenager felt an immediate bond when they first met their pet?"
                    ],
                    texts: [
                        { id: "A", name: "Ben - Bearded Dragon", content: "I have a lizard called a bearded dragon. He isn't exactly cuddly; he doesn't want to be petted like a dog. Caring for him is highly technical because his tank needs precise heat lamps to regulate his body temperature. I actually find feeding him live crickets and insects quite fascinating, though my mum hates it." },
                        { id: "B", name: "Sara - Parrot", content: "My parrot, Charlie, is incredibly intelligent. He copies the sounds of the microwave, the doorbell, and he even mimics my dad's laugh perfectly. The downside is that he is unbelievably loud, especially early in the morning. He requires a lot of mental stimulation and toys, otherwise he gets bored and starts chewing the furniture." },
                        { id: "C", name: "Tom - Rescue Dog", content: "We adopted Max from a shelter. He had been abandoned and was very anxious at first. When I sat with him in the shelter, he rested his head on my knee, and I knew instantly he was the one. He has endless energy, which is great because it drags me off the sofa to go for long runs in the woods." },
                        { id: "D", name: "Emma - Deaf Cat", content: "My cat, Luna, was born completely deaf. Because she can't hear us call her name, we have to communicate using hand gestures or by stomping heavily on the floor so she feels the vibrations. She startles easily if you sneak up on her, but once she knows you're there, she is the most affectionate and loving cat imaginable." }
                    ],
                    answers: [3, 0, 2, 1, 0, 2, 3, 1, 0, 2]
                },
                {
                    id: 10,
                    title: "Four teenagers talk about playing a musical instrument",
                    instructions: "You are going to read an article in which teenagers talk about the instruments they play. For questions 1-10, choose from the teenagers (A-D). The teenagers may be chosen more than once.",
                    questions: [
                        "Which teenager plays an instrument that requires strong lungs?",
                        "Which teenager's instrument is physically awkward to hold?",
                        "Which teenager complains about the noise level of their instrument?",
                        "Which teenager plays jazz music?",
                        "Which teenager plays an instrument that sets the timing for others?",
                        "Which teenager says their instrument requires very precise finger positioning?",
                        "Which teenager plays in an orchestra?",
                        "Which teenager's instrument is very heavy to carry around?",
                        "Which teenager appreciates the classical repertoire of their instrument?",
                        "Which teenager says practicing annoys their family?"
                    ],
                    texts: [
                        { id: "A", name: "Luke - Drums", content: "I am the drummer in a rock band. It is my job to keep the rhythm steady so the others don't lose the beat. It is a fantastic stress reliever, but my parents constantly complain about the deafening noise. I had to put soundproofing foam all over the garage walls just so my family could watch TV in peace." },
                        { id: "B", name: "Elena - Violin", content: "I play first violin in the school orchestra. Learning the violin is notoriously difficult because there are no frets on the fingerboard; you have to place your fingers with absolute precision or it sounds terrible. Plus, tucking it under your chin for two-hour rehearsals is physically very uncomfortable and gives me neck aches. But I love playing classical symphonies." },
                        { id: "C", name: "Tariq - Saxophone", content: "The saxophone is amazing because it's so versatile, but I mostly use it to play jazz improvisation. It takes a huge amount of breath control and lung power to get a clean, smooth sound. The biggest disadvantage is the weight; hauling a heavy brass instrument on the bus every day for lessons is exhausting." },
                        { id: "D", name: "Maya - Flute", content: "I chose the flute because it has such a delicate, bird-like sound. It is incredibly light and easy to carry in my backpack, unlike the cello or tuba. It requires you to control the angle of your breath across the mouthpiece perfectly. I usually play classical pieces, but recently I’ve been trying some modern pop covers." }
                    ],
                    answers: [2, 1, 0, 2, 0, 1, 1, 2, 1, 0]
                }
            ]
        };

        const TAB_NAMES = ["Part 1", "Part 2", "Part 3", "Part 4", "Part 5", "Part 6", "Part 7"];
        const TAB_DESC = [
            "Multiple Choice Cloze (8 questions)",
            "Open Cloze (8 questions)",
            "Word Formation (8 questions)",
            "Key Word Transformations (6 questions)",
            "Multiple Choice Reading (6 questions)",
            "Gapped Text (6 questions)",
            "Multiple Matching (10 questions)"
        ];

        function App() {
            const [activeTab, setActiveTab] = useState(1);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            
            const currentPartKey = `part${activeTab}`;
            const exams = examDatabase[currentPartKey];
            const currentExam = exams[currentIndex];

            useEffect(() => {
                setUserAnswers({});
                setIsSubmitted(false);
                setScore(0);
            }, [activeTab, currentIndex]);

            const handleInputChange = (key, value) => {
                if (!isSubmitted) {
                    setUserAnswers(prev => ({ ...prev, [key]: value }));
                }
            };

            const calculateScore = () => {
                let currentScore = 0;
                
                if (activeTab === 1 || activeTab === 6 || activeTab === 7) {
                    currentExam.answers.forEach((ans, idx) => {
                        if (parseInt(userAnswers[idx]) === ans) currentScore++;
                    });
                } else if (activeTab === 5) {
                    currentExam.questions.forEach((q, idx) => {
                        if (parseInt(userAnswers[idx]) === q.ans) currentScore++;
                    });
                } else if (activeTab === 2 || activeTab === 3) {
                    currentExam.answers.forEach((validAnswers, idx) => {
                        const ua = (userAnswers[idx] || "").trim().toLowerCase();
                        if (validAnswers.map(a => a.toLowerCase()).includes(ua)) currentScore++;
                    });
                } else if (activeTab === 4) {
                    currentExam.questions.forEach((q, idx) => {
                        const ua = (userAnswers[idx] || "").trim().toLowerCase().replace(/\s+/g, ' ');
                        const isCorrect = q.answers.some(validAnsArray => 
                            validAnsArray.map(a => a.toLowerCase()).includes(ua)
                        );
                        if (isCorrect) currentScore++;
                    });
                }

                setScore(currentScore);
                setIsSubmitted(true);
            };

            const maxScore = (activeTab === 4 || activeTab === 5) ? currentExam.questions.length : currentExam.answers.length;

            const renderPart1 = () => {
                const parts = currentExam.content.split(/\{(\d+)\}/g);
                return (
                    <div className="text-lg leading-loose text-justify">
                        {parts.map((part, index) => {
                            if (index % 2 === 1) {
                                const qIdx = parseInt(part);
                                const isCorrect = isSubmitted && parseInt(userAnswers[qIdx]) === currentExam.answers[qIdx];
                                const isWrong = isSubmitted && !isCorrect;
                                
                                let selClass = "mx-1 px-2 py-1 border-2 rounded-md font-semibold bg-white cursor-pointer outline-none transition-colors";
                                if (isSubmitted) {
                                    selClass += isCorrect ? " border-green-500 text-green-700 bg-green-50" : " border-red-500 text-red-700 bg-red-50";
                                } else {
                                    selClass += " border-slate-300 focus:border-blue-500";
                                }

                                return (
                                    <span key={qIdx} className="relative inline-block">
                                        <span className="absolute -top-3 -left-1 text-xs font-bold text-slate-400">{qIdx + 1}</span>
                                        <select 
                                            className={selClass}
                                            value={userAnswers[qIdx] !== undefined ? userAnswers[qIdx] : ""}
                                            onChange={(e) => handleInputChange(qIdx, e.target.value)}
                                            disabled={isSubmitted}
                                        >
                                            <option value="" disabled>-</option>
                                            {currentExam.options[qIdx].map((opt, oIdx) => (
                                                <option key={oIdx} value={oIdx}>{opt}</option>
                                            ))}
                                        </select>
                                    </span>
                                );
                            }
                            return <span key={index}>{part}</span>;
                        })}
                    </div>
                );
            };

            const renderPart2And3 = () => {
                const parts = currentExam.content.split(/\{(\d+)\}/g);
                return (
                    <div className="text-lg leading-loose text-justify">
                        {parts.map((part, index) => {
                            if (index % 2 === 1) {
                                const qIdx = parseInt(part);
                                const ua = (userAnswers[qIdx] || "").trim().toLowerCase();
                                const valid = currentExam.answers[qIdx].map(a => a.toLowerCase());
                                const isCorrect = isSubmitted && valid.includes(ua);
                                const isWrong = isSubmitted && !isCorrect;
                                
                                let inpClass = "mx-1 w-28 px-2 py-1 text-center font-semibold bg-white border-2 rounded-md outline-none transition-colors";
                                if (isSubmitted) {
                                    inpClass += isCorrect ? " border-green-500 text-green-700 bg-green-50" : " border-red-500 text-red-700 bg-red-50";
                                } else {
                                    inpClass += " border-slate-300 focus:border-blue-500";
                                }

                                return (
                                    <span key={qIdx} className="relative inline-block">
                                        <span className="absolute -top-3 -left-1 text-xs font-bold text-slate-400">{qIdx + 1}</span>
                                        <input 
                                            type="text"
                                            className={inpClass}
                                            value={userAnswers[qIdx] || ""}
                                            onChange={(e) => handleInputChange(qIdx, e.target.value)}
                                            disabled={isSubmitted}
                                            autoComplete="off"
                                        />
                                    </span>
                                );
                            }
                            if (activeTab === 3) {
                                const regex = /\(([A-Z]+)\)/g;
                                if (regex.test(part)) {
                                     const subParts = part.split(regex);
                                     return <span key={index}>
                                         {subParts.map((sp, i) => i%2===1 ? <strong key={i} className="text-slate-800 ml-1">({sp})</strong> : sp)}
                                     </span>;
                                }
                            }
                            return <span key={index}>{part}</span>;
                        })}
                    </div>
                );
            };

            const renderPart4 = () => {
                return (
                    <div className="space-y-6">
                        {currentExam.questions.map((q, idx) => {
                            const ua = (userAnswers[idx] || "").trim().toLowerCase().replace(/\s+/g, ' ');
                            const isCorrect = isSubmitted && q.answers.some(va => va.map(a => a.toLowerCase()).includes(ua));
                            
                            let inpClass = "mx-2 w-48 px-2 py-1 text-center font-bold bg-white border-2 rounded-md outline-none transition-colors";
                            if (isSubmitted) {
                                inpClass += isCorrect ? " border-green-500 text-green-700 bg-green-50" : " border-red-500 text-red-700 bg-red-50";
                            } else {
                                inpClass += " border-slate-300 focus:border-blue-500";
                            }

                            return (
                                <div key={idx} className="bg-slate-100 p-4 rounded-lg">
                                    <p className="mb-2"><span className="font-bold mr-2">{idx + 1}.</span>{q.leadIn}</p>
                                    <div className="mb-2 bg-white px-3 py-1 inline-block border rounded font-mono font-bold text-blue-800">
                                        {q.keyWord}
                                    </div>
                                    <div className="flex flex-wrap items-center mt-1">
                                        <span>{q.leadOutStart}</span>
                                        <input 
                                            type="text" 
                                            className={inpClass}
                                            value={userAnswers[idx] || ""}
                                            onChange={(e) => handleInputChange(idx, e.target.value)}
                                            disabled={isSubmitted}
                                        />
                                        <span>{q.leadOutEnd}</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            const renderPart5 = () => {
                return (
                    <div className="flex flex-col lg:flex-row gap-8">
                        <div className="lg:w-1/2 bg-slate-100 p-6 rounded-lg text-justify whitespace-pre-wrap leading-loose">
                            {currentExam.text}
                        </div>
                        <div className="lg:w-1/2 space-y-6">
                            {currentExam.questions.map((q, idx) => {
                                const isCorrect = isSubmitted && parseInt(userAnswers[idx]) === q.ans;
                                
                                return (
                                    <div key={idx} className={`p-4 rounded-lg border-2 ${isSubmitted ? (isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200') : 'bg-white border-slate-200'}`}>
                                        <p className="font-bold mb-3">{idx + 1}. {q.q}</p>
                                        <div className="space-y-2">
                                            {q.options.map((opt, oIdx) => (
                                                <label key={oIdx} className="flex items-start gap-2 cursor-pointer">
                                                    <input 
                                                        type="radio" 
                                                        name={`q${idx}`} 
                                                        value={oIdx}
                                                        checked={userAnswers[idx] === String(oIdx)}
                                                        onChange={(e) => handleInputChange(idx, e.target.value)}
                                                        disabled={isSubmitted}
                                                        className="mt-1"
                                                    />
                                                    <span className={isSubmitted && oIdx === q.ans ? 'font-bold text-green-700' : ''}>{opt}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderPart6 = () => {
                const parts = currentExam.text.split(/\{(\d+)\}/g);
                return (
                    <div className="flex flex-col lg:flex-row gap-8">
                        <div className="lg:w-3/5 text-lg leading-loose text-justify">
                            {parts.map((part, index) => {
                                if (index % 2 === 1) {
                                    const qIdx = parseInt(part);
                                    const isCorrect = isSubmitted && parseInt(userAnswers[qIdx]) === currentExam.answers[qIdx];
                                    
                                    let selClass = "mx-2 px-3 py-1 font-bold border-2 rounded bg-white outline-none";
                                    if (isSubmitted) {
                                        selClass += isCorrect ? " border-green-500 text-green-700 bg-green-50" : " border-red-500 text-red-700 bg-red-50";
                                    } else {
                                        selClass += " border-blue-400 text-blue-800";
                                    }

                                    return (
                                        <span key={qIdx} className="inline-flex items-center">
                                            <span className="font-bold mr-1 text-slate-400">[{qIdx + 1}]</span>
                                            <select 
                                                className={selClass}
                                                value={userAnswers[qIdx] !== undefined ? userAnswers[qIdx] : ""}
                                                onChange={(e) => handleInputChange(qIdx, e.target.value)}
                                                disabled={isSubmitted}
                                            >
                                                <option value="" disabled>---</option>
                                                {currentExam.sentences.map((_, sIdx) => (
                                                    <option key={sIdx} value={sIdx}>{String.fromCharCode(65 + sIdx)}</option>
                                                ))}
                                            </select>
                                        </span>
                                    );
                                }
                                return <span key={index}>{part}</span>;
                            })}
                        </div>
                        <div className="lg:w-2/5 space-y-3 bg-slate-100 p-6 rounded-lg">
                            <h3 className="font-bold text-lg mb-4">Sentences to insert:</h3>
                            {currentExam.sentences.map((sentence, idx) => (
                                <div key={idx} className="p-3 bg-white rounded shadow-sm border border-slate-200">
                                    {sentence}
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const renderPart7 = () => {
                return (
                    <div className="space-y-8">
                        <div className="bg-slate-100 p-6 rounded-lg">
                            <table className="w-full text-left">
                                <tbody>
                                    {currentExam.questions.map((q, idx) => {
                                        const isCorrect = isSubmitted && parseInt(userAnswers[idx]) === currentExam.answers[idx];
                                        let selClass = "p-1 font-bold border-2 rounded bg-white outline-none text-center w-16";
                                        if (isSubmitted) {
                                            selClass += isCorrect ? " border-green-500 text-green-700 bg-green-50" : " border-red-500 text-red-700 bg-red-50";
                                        } else {
                                            selClass += " border-slate-300";
                                        }

                                        return (
                                            <tr key={idx} className="border-b border-slate-200 last:border-0">
                                                <td className="py-3 pr-4 font-bold text-slate-500 w-8">{idx + 1}.</td>
                                                <td className="py-3 pr-4">{q}</td>
                                                <td className="py-3">
                                                    <select 
                                                        className={selClass}
                                                        value={userAnswers[idx] !== undefined ? userAnswers[idx] : ""}
                                                        onChange={(e) => handleInputChange(idx, e.target.value)}
                                                        disabled={isSubmitted}
                                                    >
                                                        <option value="" disabled>-</option>
                                                        {currentExam.texts.map((t, tIdx) => (
                                                            <option key={tIdx} value={tIdx}>{t.id}</option>
                                                        ))}
                                                    </select>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {currentExam.texts.map((t, idx) => (
                                <div key={idx} className="bg-white border border-slate-200 p-6 rounded-lg shadow-sm text-justify">
                                    <h3 className="font-bold text-xl mb-3 border-b pb-2 text-blue-800">
                                        Text {t.id} - {t.name}
                                    </h3>
                                    <p className="leading-relaxed">{t.content}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const getFeedback = () => {
                if (activeTab === 1 || activeTab === 6 || activeTab === 7) {
                    return currentExam.answers.map((ansIdx, idx) => (
                        <div key={idx} className="mb-1">
                            Q{idx + 1}: <span className="font-bold text-blue-600">
                                {activeTab === 1 ? currentExam.options[idx][ansIdx] : 
                                 activeTab === 6 ? String.fromCharCode(65 + ansIdx) : 
                                 currentExam.texts[ansIdx].id}
                            </span>
                        </div>
                    ));
                } else if (activeTab === 2 || activeTab === 3) {
                    return currentExam.answers.map((ansArray, idx) => (
                        <div key={idx} className="mb-1">
                            Q{idx + 1}: <span className="font-bold text-blue-600">{ansArray.join(" / ")}</span>
                        </div>
                    ));
                } else if (activeTab === 4) {
                    return currentExam.questions.map((q, idx) => (
                        <div key={idx} className="mb-2 pb-2 border-b last:border-0 border-slate-200">
                            Q{idx + 1}: <span className="font-bold text-blue-600">{q.answers[0][0]}</span>
                        </div>
                    ));
                } else if (activeTab === 5) {
                    return currentExam.questions.map((q, idx) => (
                        <div key={idx} className="mb-1">
                            Q{idx + 1}: <span className="font-bold text-blue-600">{String.fromCharCode(65 + q.ans)}</span>
                        </div>
                    ));
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 pb-12 flex flex-col">
                    <header className="bg-blue-800 text-white shadow-md z-10 sticky top-0">
                        <div className="max-w-6xl mx-auto px-4 py-4 flex items-center gap-3">
                            <BookOpen className="w-8 h-8 text-blue-200" />
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight">B2 First for Schools Simulator</h1>
                                <p className="text-blue-200 text-sm">Full Reading & Use of English Training</p>
                            </div>
                        </div>
                        <div className="flex overflow-x-auto bg-blue-900 scrollbar-hide px-4 max-w-6xl mx-auto">
                            {TAB_NAMES.map((name, idx) => {
                                const partNum = idx + 1;
                                const isActive = activeTab === partNum;
                                return (
                                    <button
                                        key={partNum}
                                        onClick={() => { setActiveTab(partNum); setCurrentIndex(0); }}
                                        className={`px-5 py-3 font-semibold whitespace-nowrap transition-colors border-b-4 ${
                                            isActive ? 'border-white text-white bg-blue-800' : 'border-transparent text-blue-300 hover:text-white hover:bg-blue-800/50'
                                        }`}
                                    >
                                        {name}
                                    </button>
                                );
                            })}
                        </div>
                    </header>

                    <main className="max-w-6xl w-full mx-auto px-4 mt-8 flex-1">
                        <div className="flex flex-wrap justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 gap-4">
                            <div>
                                <h2 className="text-xl font-bold text-slate-800">{currentExam.title}</h2>
                                <p className="text-slate-500 text-sm font-medium">{TAB_DESC[activeTab - 1]}</p>
                            </div>
                            <div className="flex items-center gap-2">
                                <button 
                                    onClick={() => setCurrentIndex(prev => prev - 1)} 
                                    disabled={currentIndex === 0}
                                    className="p-2 bg-slate-100 rounded hover:bg-slate-200 disabled:opacity-50"
                                >
                                    <ChevronLeft className="w-5 h-5" />
                                </button>
                                <span className="font-bold mx-2">Exam {currentIndex + 1} / {exams.length}</span>
                                <button 
                                    onClick={() => setCurrentIndex(prev => prev + 1)} 
                                    disabled={currentIndex === exams.length - 1}
                                    className="p-2 bg-slate-100 rounded hover:bg-slate-200 disabled:opacity-50"
                                >
                                    <ChevronRight className="w-5 h-5" />
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden mb-6">
                            <div className="bg-blue-50 border-b border-blue-100 p-4 flex gap-3 text-blue-900">
                                <AlertCircle className="w-6 h-6 flex-shrink-0" />
                                <p className="font-medium text-sm sm:text-base">{currentExam.instructions}</p>
                            </div>
                            
                            <div className="p-6 md:p-8">
                                {activeTab === 1 && renderPart1()}
                                {(activeTab === 2 || activeTab === 3) && renderPart2And3()}
                                {activeTab === 4 && renderPart4()}
                                {activeTab === 5 && renderPart5()}
                                {activeTab === 6 && renderPart6()}
                                {activeTab === 7 && renderPart7()}
                            </div>

                            <div className="bg-slate-50 border-t border-slate-200 p-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                                {!isSubmitted ? (
                                    <button
                                        onClick={calculateScore}
                                        className="w-full sm:w-auto px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg shadow transition-transform hover:scale-105"
                                    >
                                        Comprobar respuestas
                                    </button>
                                ) : (
                                    <div className="flex items-center gap-3 text-lg font-bold">
                                        <span>Tu puntuación:</span>
                                        <span className={`px-4 py-2 rounded-lg text-white ${score === maxScore ? 'bg-green-500' : score >= maxScore/2 ? 'bg-yellow-500' : 'bg-red-500'}`}>
                                            {score} / {maxScore}
                                        </span>
                                    </div>
                                )}
                            </div>
                        </div>

                        {isSubmitted && (
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6 animate-fade-in mb-8">
                                <h3 className="font-bold text-lg mb-4 text-slate-800 border-b pb-2">Soluciones Correctas</h3>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 text-sm">
                                    {getFeedback()}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="text-center py-6 text-slate-500 text-sm mt-auto">
                        <p className="mb-1">Motor de Exámenes B2 First for Schools</p>
                        <p>Created by Oscar del Estal (<a href="mailto:oestal@xtec.cat" className="hover:text-blue-600 transition-colors font-medium">oestal@xtec.cat</a>)</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
